<!-- Users table for AdminUsers -->
<div class="admin-table-wrapper">
  <table class="admin-table">
    <thead>
      <tr>
        <th>User</th>
        <th>Role</th>
        <th>Status</th>
        <th>Listings</th>
        <th>Registered</th>
        <th class="text-right">Actions</th>
      </tr>
    </thead>
    <tbody id="admin-users-tbody">
      {{rows}}
    </tbody>
  </table>
</div>

<!-- Individual user row -->
<script type="template" id="admin-user-row">
  <tr class="{{rowClass}}">
    <td>
      <p class="font-semibold">{{name}}{{meLabel}}</p>
      <p class="text-xs text-muted">{{email}}</p>
    </td>
    <td>
      <select data-role-id="{{id}}" {{meDisabled}} class="form-select form-select--sm">
        <option value="user" {{isUserSelected}}>User</option>
        <option value="admin" {{isAdminSelected}}>Admin</option>
      </select>
    </td>
    <td>
      <span class="status-badge status-badge--{{statusClass}}">
        {{statusLabel}}
      </span>
    </td>
    <td class="font-medium text-muted">{{publicationCount}}</td>
    <td class="text-muted">{{date}}</td>
    <td class="text-right">
      {{actions}}
    </td>
  </tr>
</script>
