<!-- Panel de Gestión de Categorías -->
<div id="panel-categories" class="admin-panel" role="tabpanel" aria-labelledby="tab-categories" hidden>
  <div class="admin-card">
    <div class="admin-card__header">
      <div>
        <h2 class="admin-card__title">Gestión de categorías</h2>
        <p class="admin-card__subtitle">Crea, edita y elimina categorías.</p>
      </div>
      <button id="btn-new-category" class="btn btn--primary">Nueva categoría</button>
    </div>

    <div id="categories-container" class="admin-table-wrapper">
      <p class="admin-loading">Cargando categorías…</p>
    </div>
  </div>

  <!-- Modal Nueva/Editar Categoría -->
  <div id="category-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="category-modal-title" hidden>
    <div class="modal modal--sm">
      <div class="modal__header">
        <h3 id="category-modal-title" class="modal__title">Nueva categoría</h3>
        <button id="close-category-modal" class="modal__close" aria-label="Cerrar modal">✕</button>
      </div>
      <form id="category-form" class="modal__body">
        <input type="hidden" id="category-id" />
        <div class="form-group">
          <label for="category-name" class="form-label form-label--required">Nombre *</label>
          <input type="text" id="category-name" name="name" required class="form-input" placeholder="Ej: Electrónica" />
        </div>
        <div class="form-group">
          <label for="category-description" class="form-label">Descripción</label>
          <textarea id="category-description" name="description" rows="3" class="form-textarea" placeholder="Descripción opcional"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="cancel-category" class="btn btn--secondary">Cancelar</button>
          <button type="submit" class="btn btn--primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
