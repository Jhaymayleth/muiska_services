<!-- Header del panel de administración -->
<header class="admin-header">
  <div class="admin-header__content">
    <div class="admin-header__info">
      <p class="admin-header__subtitle">Administración de MUISKA</p>
      <h1 class="admin-header__title">Panel de control</h1>
      <p class="admin-header__greeting">Hola, {{adminName}}. Aquí tienes el estado de la comunidad.</p>
    </div>
    <button id="refresh-dashboard" class="admin-header__refresh-btn" aria-label="Actualizar datos">
      <span aria-hidden="true">↻</span> Actualizar datos
    </button>
  </div>
</header>
