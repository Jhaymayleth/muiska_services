<!-- Publications table for AdminPublications -->
<div class="admin-table-wrapper">
  <table class="admin-table">
    <thead>
      <tr>
        <th>Publication</th>
        <th>Category</th>
        <th>Status</th>
        <th>Price</th>
        <th>User</th>
        <th>Date</th>
        <th class="text-right">Actions</th>
      </tr>
    </thead>
    <tbody id="publications-tbody">
      {{rows}}
    </tbody>
  </table>
</div>

<!-- Individual publication row -->
<script type="template" id="admin-publication-row">
  <tr class="transition hover:bg-background/70">
    <td class="py-4 pr-4 font-semibold text-text">{{title}}</td>
    <td class="py-4 pr-4">{{category}}</td>
    <td class="py-4 pr-4"><span class="status-badge status-badge--{{statusClass}}">{{statusLabel}}</span></td>
    <td class="py-4 pr-4 font-medium text-accent">${{price}}</td>
    <td class="py-4 pr-4 text-text/70">{{userName}}</td>
    <td class="py-4 text-text/60">{{date}}</td>
    <td class="py-4 text-right whitespace-nowrap">
      <button data-action="toggle-status" data-id="{{id}}" data-status="{{statusClass}}" class="btn btn--ghost btn--sm">{{toggleLabel}}</button>
      <button data-action="delete" data-id="{{id}}" class="btn btn--danger btn--sm">Delete</button>
    </td>
  </tr>
</script>
