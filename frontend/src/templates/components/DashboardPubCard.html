<!-- Publication card for Dashboard -->
<div class="flex items-center justify-between rounded-xl border border-border bg-white p-4 shadow-soft transition-all duration-200 hover:shadow-elevated hover:-translate-y-0.5">
  <div>
    <h3 class="font-semibold text-text">{{title}}</h3>
    <p class="text-sm text-text/70 mt-0.5">${{price}}{{#if category}} · {{category}}{{/if}} · {{statusBadge}}</p>
  </div>
  <div class="flex gap-2">
    <button data-id="{{id}}" class="edit-btn rounded-lg bg-accent/10 px-3.5 py-1.5 text-sm font-medium text-accent transition-all duration-200 hover:bg-accent/20 active:scale-95">Edit</button>
    <button data-id="{{id}}" class="delete-btn rounded-lg bg-red-50 px-3.5 py-1.5 text-sm font-medium text-red-600 transition-all duration-200 hover:bg-red-100 active:scale-95">Delete</button>
  </div>
</div>
