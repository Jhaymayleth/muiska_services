<!-- Card de favorito para Dashboard -->
<div class="flex items-center justify-between rounded-xl border border-border bg-white p-4">
  <div class="flex items-center gap-4">
    {{#if hasImage}}
      <img src="{{image}}" alt="{{title}}" class="h-20 w-20 rounded-lg object-cover">
    {{else}}
      <div class="h-20 w-20 rounded-lg bg-muted flex items-center justify-center">
        <svg class="w-8 h-8 text-text/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
    {{/if}}
    <div>
      <h3 class="font-semibold">{{title}}</h3>
      <p class="text-sm text-text/70">${{price}}{{#if category}} · {{category}}{{/if}} · {{statusBadge}}</p>
      <p class="text-xs text-text/50">Por: {{userName}}</p>
    </div>
  </div>
  <div class="flex gap-2">
    <a href="/publicacion/{{id}}" class="rounded bg-accent/10 px-3 py-1 text-sm text-accent transition hover:bg-accent/20">Ver</a>
    <button data-id="{{id}}" class="unfav-btn rounded bg-red-50 px-3 py-1 text-sm text-red-600 transition hover:bg-red-100">Quitar</button>
  </div>
</div>
