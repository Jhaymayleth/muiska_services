<!-- Favorite card for Dashboard -->
<div class="flex items-center justify-between rounded-xl border border-border bg-white p-4 shadow-soft transition-all duration-200 hover:shadow-elevated hover:-translate-y-0.5">
  <div class="flex items-center gap-4">
    {{#if hasImage}}
      <img src="{{image}}" alt="{{title}}" class="h-20 w-20 rounded-lg object-cover shrink-0">
    {{else}}
      <div class="h-20 w-20 rounded-lg bg-muted flex items-center justify-center shrink-0">
        <svg class="w-8 h-8 text-text/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
    {{/if}}
    <div>
      <h3 class="font-semibold text-text">{{title}}</h3>
      <p class="text-sm text-text/70 mt-0.5">${{price}}{{#if category}} · {{category}}{{/if}} · {{statusBadge}}</p>
      <p class="text-xs text-text/50 mt-0.5">By: {{userName}}</p>
    </div>
  </div>
  <div class="flex gap-2">
    <a href="/listing/{{id}}" class="rounded-lg bg-accent/10 px-3.5 py-1.5 text-sm font-medium text-accent transition-all duration-200 hover:bg-accent/20 active:scale-95">View</a>
    <button data-id="{{id}}" class="unfav-btn rounded-lg bg-red-50 px-3.5 py-1.5 text-sm font-medium text-red-600 transition-all duration-200 hover:bg-red-100 active:scale-95">Remove</button>
  </div>
</div>
