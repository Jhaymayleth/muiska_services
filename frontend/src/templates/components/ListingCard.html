<button class="favorite-btn absolute top-3 right-3 p-1 rounded-full bg-white/90 backdrop-blur-sm shadow-sm transition-all hover:scale-110 focus:outline-none focus:ring-2 focus:ring-primary" aria-label="Agregar a favoritos" title="Agregar a favoritos">
  <svg class="w-5 h-5 text-text/40 hover:text-red-500 transition-colors" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
</button>
<div class="space-y-3">
  <div class="flex items-start justify-between gap-2">
    <div>
      <h4 class="font-semibold text-primary">{{title}}</h4>
      <p class="mt-1 text-xs uppercase tracking-wide text-text/50">{{category}}</p>
    </div>
    <span class="rounded-full bg-accent/10 px-2 py-1 text-xs font-medium text-accent">${{price}}</span>
  </div>
  <p class="line-clamp-3 text-sm text-text/70">{{description}}</p>
  <div class="flex flex-wrap gap-2 text-xs text-text/60">
    {{locationBadge}}
    {{contactBadge}}
  </div>
  {{imagesHtml}}
</div>
