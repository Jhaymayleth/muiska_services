<!-- Favorites stats for Dashboard -->

    <p class="text-sm text-text/60">Total favorites</p>
    <p class="mt-2 font-display text-3xl font-bold text-primary" id="fav-stat-total">—</p>
  </article>
  <article class="rounded-2xl border border-border bg-white p-5 shadow-sm">
    <p class="text-sm text-text/60">Active</p>
    <p class="mt-2 font-display text-3xl font-bold text-accent" id="fav-stat-active">—</p>
  </article>
  <article class="rounded-2xl border border-border bg-white p-5 shadow-sm">
    <p class="text-sm text-text/60">Sold/Inactive</p>
    <p class="mt-2 font-display text-3xl font-bold text-text" id="fav-stat-inactive">—</p>
  </article>
