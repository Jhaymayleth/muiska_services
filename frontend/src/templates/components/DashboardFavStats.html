<!-- Favorites stats for Dashboard -->
<div class="grid gap-4 sm:grid-cols-3 mb-6">
  <article class="rounded-2xl border border-border bg-white p-5 shadow-soft transition-all duration-200 hover:shadow-elevated hover:-translate-y-0.5">
    <div class="flex items-center gap-3 mb-2">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/5">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <p class="text-sm text-text/60">Total favorites</p>
    </div>
    <p class="font-display text-3xl font-bold text-text" id="fav-stat-total">—</p>
  </article>
  <article class="rounded-2xl border border-border bg-white p-5 shadow-soft transition-all duration-200 hover:shadow-elevated hover:-translate-y-0.5">
    <div class="flex items-center gap-3 mb-2">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-accent/5">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-accent"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
      </div>
      <p class="text-sm text-text/60">Active</p>
    </div>
    <p class="font-display text-3xl font-bold text-accent" id="fav-stat-active">—</p>
  </article>
  <article class="rounded-2xl border border-border bg-white p-5 shadow-soft transition-all duration-200 hover:shadow-elevated hover:-translate-y-0.5">
    <div class="flex items-center gap-3 mb-2">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-muted">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-text/50"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <p class="text-sm text-text/60">Sold/Inactive</p>
    </div>
    <p class="font-display text-3xl font-bold text-text" id="fav-stat-inactive">—</p>
  </article>
</div>
