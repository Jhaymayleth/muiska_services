<!-- Template principal de detalle de publicación -->
<div class="space-y-6">
  {{imagesHtml}}

  <div class="space-y-3">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold text-primary">{{title}}</h1>
        <p class="mt-1 text-sm uppercase tracking-wide text-text/50">{{category}}</p>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0">
        <!-- FAV_BTN_PLACEHOLDER -->
        <div class="flex-shrink-0 rounded-full bg-accent/10 px-4 py-2 text-lg font-semibold text-accent">${{price}}</div>
      </div>
    </div>

    <div class="flex flex-wrap items-center gap-3 text-sm text-text/60 border-t pt-3">{{metaHtml}}</div>
  </div>

  <div class="border-t pt-6">
    <h2 class="text-lg font-semibold text-text mb-3">Descripción</h2>
    <p class="text-text/70 whitespace-pre-wrap">{{description}}</p>
  </div>
</div>
