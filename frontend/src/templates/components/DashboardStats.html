<!-- Stats cards for Dashboard -->
<div class="grid gap-4 sm:grid-cols-3" id="dashboard-stats-cards">
  <article class="rounded-2xl border border-border bg-white p-5 shadow-sm">
    <p class="text-sm text-text/60">Total listings</p>
    <p class="mt-2 font-display text-3xl font-bold text-primary" id="stat-total">—</p>
  </article>
  <article class="rounded-2xl border border-border bg-white p-5 shadow-sm">
    <p class="text-sm text-text/60">Active</p>
    <p class="mt-2 font-display text-3xl font-bold text-accent" id="stat-active">—</p>
  </article>
  <article class="rounded-2xl border border-border bg-white p-5 shadow-sm">
    <p class="text-sm text-text/60">Sold/Inactive</p>
    <p class="mt-2 font-display text-3xl font-bold text-text" id="stat-sold">—</p>
  </article>
</div>
