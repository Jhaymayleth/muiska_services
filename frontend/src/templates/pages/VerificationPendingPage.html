<div class="w-full max-w-md text-center">
  <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-primary/10">
    <svg class="h-8 w-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>

  <h1 class="mb-2 text-2xl font-bold text-gray-900">Profile under verification</h1>
  <p class="mb-6 text-gray-600">
    We've received your request. A verifier will review your profile and notify you

  </p>

  <div class="space-y-3">
    <button
      id="retry-btn"
      class="w-full rounded-lg bg-primary px-4 py-2.5 text-sm font-medium text-white hover:bg-primary/90 transition-colors"
    >
      Check status
    </button>
    <button
      id="home-btn"
      class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
    >
      Back to home
    </button>

  <p class="mt-6 text-sm text-gray-500">
    Questions? <a href="#" class="text-primary hover:underline">Contact support</a>
