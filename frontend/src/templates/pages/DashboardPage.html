<div class="rounded-2xl border border-border bg-white p-6 shadow-elevated">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div class="flex items-center gap-4">
      <div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary text-background text-xl font-bold shadow-sm ring-4 ring-primary/10">{{userInitials}}</div>
      <div>
        <h2 class="font-display text-2xl font-bold text-text">{{userName}}</h2>
        <p class="text-sm text-text/60">{{userEmail}}</p>
        <p class="text-xs text-text/50">Role: {{userRole}} · Member since {{userSince}}</p>
      </div>
    </div>
    <div class="flex flex-wrap gap-3">
      <a href="/create" id="btn-new-pub" class="rounded-xl bg-primary px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all duration-200 hover:bg-primary-hover hover:shadow-md active:scale-[0.97]">New listing</a>
      <a href="/profile" id="btn-profile" class="rounded-xl border border-border bg-white px-5 py-2.5 text-sm font-medium text-text transition-all duration-200 hover:bg-muted/60 active:scale-[0.97]">View profile</a>
      <a href="/explore" id="btn-explore" class="rounded-xl border border-border bg-white px-5 py-2.5 text-sm font-medium text-text transition-all duration-200 hover:bg-muted/60 active:scale-[0.97]">Explore</a>
      {{adminButton}}
    </div>
  </div>
</div>

<div id="dashboard-stats" class="rounded-xl"></div>

<!-- Tabs -->
<div class="rounded-2xl border border-border bg-white shadow-soft overflow-hidden">
  <nav class="flex border-b border-border" aria-label="Dashboard sections">
    <button id="tab-publications" class="tab-btn px-6 py-3.5 text-sm font-medium transition-all duration-200 bg-primary text-white" data-tab="publications">My publications</button>
    <button id="tab-favorites" class="tab-btn px-6 py-3.5 text-sm font-medium transition-all duration-200 text-text/60 hover:text-text hover:bg-muted/40" data-tab="favorites">Favorites</button>
  </nav>

  <div id="publications-section" class="p-6">
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-display font-bold text-text">My publications</h2>
      </div>
      <div id="dashboard-list" class="space-y-3"></div>
    </section>
  </div>

  <div id="favorites-section" class="p-6 hidden">
    <div id="favorites-stats"></div>
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-display font-bold text-text">My favorites</h2>
      </div>
      <div id="favorites-list" class="space-y-3"></div>
    </section>
  </div>
</div>
