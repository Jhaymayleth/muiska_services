<div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 animate-fade-in">
  <h1 class="text-3xl font-display font-bold text-primary">Explore</h1>
</div>

<div class="rounded-2xl border border-border bg-white p-4 shadow-sm transition-all duration-200 hover:shadow-elevated">
  <form id="filter-form" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-5">
    <div class="sm:col-span-2">
      <label for="search" class="block text-sm font-medium text-text mb-1">Search</label>
      <input
        type="search"
        id="search"
        name="search"
        placeholder="Title, description..."
        class="w-full rounded-lg border border-border bg-muted/30 px-3 py-2 outline-none transition-all duration-200 focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/10"
      />
    </div>
    <div>
      <label for="category" class="block text-sm font-medium text-text mb-1">Category</label>
      <select
        id="category"
        name="category"
        class="w-full rounded-lg border border-border bg-muted/30 px-3 py-2 outline-none transition-all duration-200 focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/10"
      >
        <option value="">All</option>
      </select>
    </div>
    <div>
      <label for="minPrice" class="block text-sm font-medium text-text mb-1">Min price</label>
      <input
        type="number"
        id="minPrice"
        name="minPrice"
        step="0.01"
        min="0"
        placeholder="0"
        class="w-full rounded-lg border border-border bg-muted/30 px-3 py-2 outline-none transition-all duration-200 focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/10"
      />
    </div>
    <div>
      <label for="maxPrice" class="block text-sm font-medium text-text mb-1">Max price</label>
      <input
        type="number"
        id="maxPrice"
        name="maxPrice"
        step="0.01"
        min="0"
        placeholder="∞"
        class="w-full rounded-lg border border-border bg-muted/30 px-3 py-2 outline-none transition-all duration-200 focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/10"
      />
    </div>
    <div class="sm:col-span-2 lg:col-span-1">
      <label class="block text-sm font-medium text-text mb-1">Neighborhood</label>
      <div id="neighborhood-autocomplete"></div>
      <input type="hidden" id="location" name="location" />
    </div>
    <div class="sm:col-span-2 lg:col-span-1 flex items-end">
      <button
        type="submit"
        class="w-full rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white transition-all duration-200 hover:bg-primary-hover active:scale-[0.97] shadow-sm"
      >
        Filter
      </button>
    </div>
    <div class="sm:col-span-2 lg:col-span-1 flex items-end">
      <button
        type="button"
        id="clear-filters"
        class="w-full rounded-lg border border-border bg-white px-4 py-2 text-sm font-medium text-text transition-all duration-200 hover:bg-muted hover:-translate-y-0.5 active:scale-[0.97]"
      >
        Clear
      </button>
    </div>
  </form>
</div>

<div id="listings-grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 animate-fade-in" style="animation-delay: 100ms"></div>

<div id="pagination" class="flex justify-center mt-8 animate-fade-in" style="animation-delay: 200ms"></div>
