<div class="rounded-2xl border border-border bg-white p-6 md:p-8 shadow-elevated" id="detail-container">
  <div class="flex justify-center py-8">
    <div class="animate-pulse space-y-4 w-full max-w-md">
      <div class="h-6 bg-muted rounded w-3/4"></div>
      <div class="h-4 bg-muted rounded w-1/2"></div>
      <div class="h-4 bg-muted rounded w-1/3"></div>
    </div>
  </div>
</div>
<div id="owner-actions" class="hidden"></div>

<script type="template" id="detail-template">
<div class="space-y-6">
  {{imagesHtml}}

  <div class="space-y-3">
    <div class="flex items-start justify-between gap-4">
      <div><h1 class="text-2xl font-display font-bold text-text">{{title}}</h1><p class="mt-1 text-sm uppercase tracking-wide text-text/50">{{category}}</p></div>
      <div class="flex items-center gap-3 flex-shrink-0"><!-- FAV_BTN_PLACEHOLDER --><div class="flex-shrink-0 rounded-full bg-accent/10 px-4 py-2 text-xl font-bold font-display text-accent">${{price}}</div></div>
    </div>

    <div class="flex flex-wrap items-center gap-3 text-sm text-text/60 border-t pt-3">{{metaHtml}}</div>
  </div>

  <div class="border-t pt-6"><h2 class="text-lg font-display font-bold text-text mb-3">Description</h2><p class="text-text/70 leading-relaxed whitespace-pre-wrap">{{description}}</p></div>
</div>
</script>
