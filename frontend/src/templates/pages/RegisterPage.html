<h1 class="text-3xl font-semibold text-primary">Create Account</h1>
<form id="register-form" class="space-y-4">
  <div>
    <label for="name" class="block text-sm font-medium text-text">Full name</label>
    <input
      type="text"
      id="name"
      name="name"
      required
      placeholder="John Doe"
      class="mt-1 w-full rounded-lg border border-border bg-background px-4 py-2 text-sm text-text outline-none focus:border-primary"
    />
    <p class="mt-1 text-xs text-text/60">Minimum 3 characters</p>
  </div>
  <div>
    <label for="email" class="block text-sm font-medium text-text">Email address</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      placeholder="you@email.com"
      class="mt-1 w-full rounded-lg border border-border bg-background px-4 py-2 text-sm text-text outline-none focus:border-primary"
    />
    <p class="mt-1 text-xs text-text/60">You'll use this to log in</p>
  </div>
  <div>
    <label for="password" class="block text-sm font-medium text-text">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      required
      placeholder="••••••••"
      class="mt-1 w-full rounded-lg border border-border bg-background px-4 py-2 text-sm text-text outline-none focus:border-primary"
    />
    <p class="mt-1 text-xs text-text/60">Minimum 8 characters, with uppercase, lowercase &amp; number</p>
  </div>
  <div>
    <label for="password-confirm" class="block text-sm font-medium text-text">Confirm password</label>
    <input
      type="password"
      id="password-confirm"
      name="password-confirm"
      required
      placeholder="••••••••"
      class="mt-1 w-full rounded-lg border border-border bg-background px-4 py-2 text-sm text-text outline-none focus:border-primary"
    />
  </div>
  <div>
    <label class="block text-sm font-medium text-text mb-2">Account type</label>
    <div class="grid grid-cols-2 gap-3">
      <label class="relative cursor-pointer">
        <input
          type="radio"
          name="userType"
          value="client"
          checked
          class="sr-only peer"
        />
        <div class="rounded-lg border-2 border-border bg-white p-4 text-center text-sm font-medium text-text peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary">
          <div class="font-semibold">Client</div>
          <div class="text-xs text-text/60 mt-1">Find and contact sellers</div>
        </div>
      </label>
      <label class="relative cursor-pointer">
        <input
          type="radio"
          name="userType"
          value="seller"
          class="sr-only peer"
        />
        <div class="rounded-lg border-2 border-border bg-white p-4 text-center text-sm font-medium text-text peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary">
          <div class="font-semibold">Seller / Entrepreneur</div>
          <div class="text-xs text-text/60 mt-1">Sell products/services (verification required)</div>
        </div>
      </label>
    </div>
  </div>
  <button
    type="submit"
    class="w-full rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition hover:bg-primary-hover"
  >
    Register
  </button>
</form>
<p id="register-error" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-600"></p>
<p class="text-center text-sm text-text/70">
  Already have an account?
  <a href="/login" class="font-semibold text-primary hover:underline">Login</a>
</p>
