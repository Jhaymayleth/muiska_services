<h1 class="text-3xl font-display font-bold text-text">Welcome back</h1>
<p class="text-text/60 -mt-4">Sign in to your account</p>
<form id="login-form" class="space-y-5 mt-2">
  <div>
    <label for="email" class="block text-sm font-medium text-text mb-1.5">Email</label>
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-text/40 pointer-events-none"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <input
        type="email"
        id="email"
        name="email"
        required
        placeholder="you@email.com"
        class="w-full rounded-xl border border-border bg-background pl-10 pr-4 py-2.5 text-sm text-text outline-none transition-all duration-200 placeholder:text-text/30 focus:border-primary focus:ring-2 focus:ring-primary/20"
      />
    </div>
  </div>
  <div>
    <label for="password" class="block text-sm font-medium text-text mb-1.5">Password</label>
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-text/40 pointer-events-none"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input
        type="password"
        id="password"
        name="password"
        required
        placeholder="••••••••"
        class="w-full rounded-xl border border-border bg-background pl-10 pr-4 py-2.5 text-sm text-text outline-none transition-all duration-200 placeholder:text-text/30 focus:border-primary focus:ring-2 focus:ring-primary/20"
      />
    </div>
  </div>
  <button
    type="submit"
    id="login-submit"
    class="flex items-center justify-center gap-2 w-full rounded-xl bg-primary px-4 py-3 text-sm font-semibold text-white shadow-sm transition-all duration-200 hover:bg-primary-hover hover:shadow-md active:scale-[0.98]"
  >
    <span id="login-btn-text">Login</span>
    <svg id="login-spinner" class="hidden animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
  </button>
</form>
<div id="login-error" class="hidden flex items-center gap-2 rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span id="login-error-text"></span>
</div>
<p class="text-center text-sm text-text/60">
  Don't have an account?
  <a href="/register" class="font-semibold text-primary hover:text-primary-hover transition-colors">Register →</a>
</p>
