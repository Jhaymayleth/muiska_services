<div class="rounded-2xl border border-border bg-white p-6 shadow-sm">
  <div class="flex items-center gap-4">
    <div class="flex-1">
      <h1 class="text-3xl font-semibold text-primary">My Profile</h1>
      <p class="text-sm text-text/60">Manage your personal information and security</p>
    </div>
  </div>
</div>

<div class="rounded-2xl border border-border bg-white p-6 shadow-sm space-y-6">
  <div class="border-b border-border pb-6">
    <h2 class="text-lg font-semibold text-text mb-4">Personal Information</h2>
    <form id="profile-form" class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-text">Full name</label>
        <input
          type="text"
          id="name"
          name="name"
          value="{{userName}}"
          required
          class="mt-1 w-full rounded-lg border border-border bg-background px-3 py-2 outline-none focus:border-primary"
        />
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-text">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{userEmail}}"
          required
          class="mt-1 w-full rounded-lg border border-border bg-background px-3 py-2 outline-none focus:border-primary"
        />
      </div>
      <div class="flex gap-3">
        <button
          type="submit"
          class="rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white transition hover:bg-primary-hover"
        >
          Save changes
        </button>
        <span id="profile-message" class="flex items-center text-sm text-text/60 hidden"></span>
      </div>
    </form>
  </div>

  <div>
    <h2 class="text-lg font-semibold text-text mb-4">Change Password</h2>
    <form id="password-form" class="space-y-4">
      <div>
        <label for="currentPassword" class="block text-sm font-medium text-text">Current password</label>
        <input
          type="password"
          id="currentPassword"
          name="currentPassword"
          required
          class="mt-1 w-full rounded-lg border border-border bg-background px-3 py-2 outline-none focus:border-primary"
        />
      </div>
      <div>
        <label for="newPassword" class="block text-sm font-medium text-text">New password</label>
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          required
          minlength="6"
          class="mt-1 w-full rounded-lg border border-border bg-background px-3 py-2 outline-none focus:border-primary"
        />
        <p class="mt-1 text-xs text-text/50">Minimum 6 characters</p>
      </div>
      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-text">Confirm new password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          required
          class="mt-1 w-full rounded-lg border border-border bg-background px-3 py-2 outline-none focus:border-primary"
        />
      </div>
      <div class="flex gap-3">
        <button
          type="submit"
          class="rounded-lg bg-accent/10 px-4 py-2 text-sm font-medium text-accent transition hover:bg-accent/20"
        >
          Update password
        </button>
        <span id="password-message" class="flex items-center text-sm text-text/60 hidden"></span>
      </div>
    </form>
  </div>

  <div class="border-t border-border pt-6">
    <h2 class="text-lg font-semibold text-text mb-4">Danger Zone</h2>
    <p class="text-sm text-text/70 mb-4">Deleting your account is irreversible. All your listings and data will be deleted.</p>
    <button
      id="delete-account-btn"
      class="rounded-lg bg-red-50 px-4 py-2 text-sm font-medium text-red-600 transition hover:bg-red-100"
    >
      Delete my account
    </button>
  </div>
</div>
