<div class="max-w-5xl mx-auto px-4 md:px-6 py-8">
  <div class="mb-4 flex items-center gap-3">
    <button id="back-btn" class="rounded-xl border border-border bg-white px-3 py-2 text-sm font-medium text-text hover:bg-muted transition-all">
      ← Back
    </button>
    <h1 class="text-2xl font-display font-bold text-text">Messages</h1>
    <span id="connection-status" class="ml-auto text-xs text-red-500 hidden">Disconnected</span>
  </div>

  <div class="flex flex-col md:flex-row gap-4">
    <!-- Conversations sidebar -->
    <div class="w-full md:w-80 shrink-0">
      <div class="bg-white rounded-2xl border border-border/60 shadow-sm overflow-hidden">
        <div class="border-b border-border/60 px-4 py-3.5">
          <h2 class="text-sm font-semibold text-text">Conversations</h2>
        </div>
        <div id="conversations-list" class="max-h-[600px] overflow-y-auto">
          <p class="p-5 text-sm text-text-tertiary text-center">Loading...</p>
        </div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="flex-1">
      <div id="chat-container" class="bg-white rounded-2xl border border-border/60 shadow-sm overflow-hidden">
        <div id="chat-header" class="border-b border-border/60 px-4 py-3.5">
          <p class="text-sm text-text-tertiary">Select a conversation to start chatting</p>
        </div>
        <div id="messages-container" class="h-[500px] overflow-y-auto p-5">
          <p class="text-center text-sm text-text-tertiary py-12">No conversation selected</p>
        </div>
        <div id="chat-input-area" class="hidden border-t border-border/60 p-4">
          <div class="flex items-center gap-2">
            <input
              type="text"
              id="message-input"
              placeholder="Type a message..."
              class="flex-1 rounded-xl border border-border bg-white px-4 py-2.5 text-sm text-text outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary-lighter placeholder:text-text-tertiary"
            />
            <button
              id="send-btn"
              class="rounded-xl bg-primary px-5 py-2.5 text-sm font-medium text-white transition-all hover:bg-primary-hover shadow-primary"
            >
              Send
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
