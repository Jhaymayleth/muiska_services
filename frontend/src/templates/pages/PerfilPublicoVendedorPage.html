<div class="max-w-5xl mx-auto px-4 md:px-6 py-8">
  <div class="mb-6">
    <button id="back-btn" class="rounded-xl border border-border bg-white px-3 py-2 text-sm font-medium text-text hover:bg-muted transition-all">
      ← Back
    </button>
  </div>

  <!-- Seller profile card -->
  <div class="bg-white rounded-2xl border border-border/60 shadow-sm p-6 md:p-8">
    <div class="flex flex-col md:flex-row md:items-start md:gap-6">
      <div class="mb-4 md:mb-0">
        <div id="profile-avatar" class="flex h-24 w-24 items-center justify-center overflow-hidden rounded-2xl bg-primary-lighter">
          <span class="text-3xl font-bold text-primary font-display">?</span>
        </div>
      </div>

      <div class="flex-1">
        <div class="flex items-start justify-between">
          <div>
            <h1 id="profile-name" class="text-2xl font-display font-bold text-text">Loading...</h1>
            <p id="profile-neighborhood" class="mt-1 text-sm text-text-secondary"></p>
            <p id="profile-distance" class="mt-1 text-sm text-text-tertiary"></p>
          </div>
          <div id="profile-badge" class="mt-1 md:mt-0"></div>
        </div>

        <div id="profile-rating" class="mt-3 flex items-center gap-2">
          <span class="text-sm font-medium text-text-secondary"></span>
        </div>

        <p id="profile-bio" class="mt-4 text-sm text-text-secondary leading-relaxed"></p>

        <div id="profile-contact" class="mt-6 flex flex-wrap gap-3">
          <a
            id="whatsapp-btn"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center gap-2 rounded-xl bg-[#25D366] px-5 py-2.5 text-sm font-medium text-white hover:bg-[#20bd5a] transition-all shadow-sm"
          >
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Contact via WhatsApp
          </a>
        </div>

        <div id="profile-stats" class="mt-6 grid grid-cols-3 gap-4 border-t border-border/60 pt-5">
          <div class="text-center bg-background rounded-xl p-3">
            <span id="stat-active" class="block text-2xl font-bold text-primary font-display">0</span>
            <span class="text-xs text-text-tertiary">Active Listings</span>
          </div>
          <div class="text-center bg-background rounded-xl p-3">
            <span id="stat-reviews" class="block text-2xl font-bold text-primary font-display">0</span>
            <span class="text-xs text-text-tertiary">Reviews</span>
          </div>
          <div class="text-center bg-background rounded-xl p-3">
            <span id="stat-rating" class="block text-2xl font-bold text-primary font-display">0.0</span>
            <span class="text-xs text-text-tertiary">Avg Rating</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Seller listings -->
  <div class="mt-10">
    <h2 class="mb-5 text-xl font-display font-bold text-text">Listings</h2>
    <div id="listings-grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 stagger-children">
      <p class="col-span-full text-text-tertiary text-center py-8">Loading listings...</p>
    </div>
  </div>
</div>
