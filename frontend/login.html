<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Marielsa Parra">
    <meta name="description" content="Plataforma de intercambio comunitario">
    <meta name="keywords" content="Muiska, Servicios">

    <title>Muiska Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Quicksand:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <div class="logo">
            <img src="./image/logomuiska-preview.png" alt="Logo Muiska Services">
        </div>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Categorias</a></li>
                <button class="boton-iniciar-sesion"><a href="#">Iniciar sesion</a></button>
                <button class="boton-registrarse"><a href="#">Registrarse</a></button>
            </ul>
        </nav>
    </header>

    <!-- Iniciar sesion -->
    <main>
        <section id="login">
            <div class="container">
                <h1>Inicia sesión</h1>
                <p>Inicia sesión para acceder a tu cuenta</p>
                <from class="login-form">
                    <div class="container">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="container">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password">
                    </div>
                    <button type="submit">Iniciar sesión</button>
                </from>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <p>© 2024 Muiska Services. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>
</body>
